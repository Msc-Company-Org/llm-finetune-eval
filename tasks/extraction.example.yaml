name: invoice-field-extraction
system: |
  You extract structured fields from invoice text. Output ONLY a JSON object with
  the keys "vendor", "total", and "due_date". No prose, no code fences.
prompt_template: |
  Extract vendor, total, and due_date from this invoice text:
  ---
  {input}
# {"input": "<invoice text>", "expected": {"vendor": "...", "total": "...", "due_date": "..."}}
test_set: invoices.example.jsonl
metrics: [json_match, format_adherence, refusal_rate, latency, cost]
max_tokens: 256

# Per-1M-token prices (USD) used for the cost metric. Keys are provider strings.
# Edit to match your real baseline and your amortized GPU cost for the candidate.
pricing:
  "openai:gpt-4":
    input: 30.0
    output: 60.0
  "anthropic:claude-opus-4-8":
    input: 5.0
    output: 25.0
  "local:http://localhost:8000/v1::my-qlora-model":
    input: 0.1
    output: 0.1
